<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Literature Clock</title>
  
  <!-- Favicon + PWA -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Literature Clock">
  <meta property="og:description" content="Time told through the words of literature. A new quote for every minute of the day.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://simiono.com/clock/">
  <meta property="og:image" content="https://simiono.com/clock/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="description" content="Time told through the words of literature. A new quote for every minute of the day.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="clock">
    <div id="quote-container">
      <blockquote id="quote"></blockquote>
      <cite id="attribution">
        <span id="author"></span>
        <span id="title"></span>
      </cite>
    </div>
    <div id="time-display"></div>
  </main>
  <div id="nav-hint">← → TIME TRAVEL &nbsp;·&nbsp; SPACE NEXT QUOTE &nbsp;·&nbsp; F FULLSCREEN</div>
  <footer>
    <a href="https://simiono.com/Literature-Clock" id="about-link">About</a>
    <a href="https://github.com/wintermuteHB/LiteratureClock" id="source-link">Source</a>
    <button id="theme-toggle" aria-label="Toggle light/dark theme">☀ Light</button>
  </footer>
  <script src="js/clock.js"></script>
</body>
</html>
